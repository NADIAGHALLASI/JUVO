<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JUVO</title>

    <link rel="icon" href="images/icon/j.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="login-box">
        <form id="loginForm" autocomplete="off" novalidate>
          <h2>Welcome to JUVO</h2>

          <div class="inputbox">
            <input
              type="text"
              id="username"
              name="UserName"
              inputmode="text"
              placeholder=""
              maxlength="5"
              autocomplete="off"
            />
            <span>UserName</span>
            <i></i>
            <div class="username-hint">
              <small class="hint-text">
                <i class="fas fa-info-circle"></i>
                Only English letters, exactly 5 characters
              </small>
            </div>
          </div>

          <div class="code-container" id="codeContainer" style="display: none">
            <div class="code-display">
              <span class="code-label">Verification Code:</span>
              <span id="randomCode" class="random-code">****</span>
              <button
                type="button"
                id="refreshCode"
                class="refresh-btn"
                title="Generate new code"
              >
                <i class="fas fa-sync-alt"></i>
              </button>
            </div>
            <div class="inputbox code-input">
              <input
                type="text"
                id="verificationCode"
                name="Code"
                inputmode="numeric"
                placeholder=""
                maxlength="4"
                disabled
              />
              <span>Enter Code</span>
              <i></i>
            </div>
          </div>

          <button type="submit" id="sendCodeBtn" class="submit-btn" disabled>
            <span id="btnText">Send Code</span>
            <i class="fas fa-arrow-right" id="btnIcon"></i>
          </button>
        </form>
      </div>
    </div>
    <script src="js/script.js"></script>
  </body>
</html>
