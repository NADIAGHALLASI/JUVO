<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Juice Order</title>
    <link rel="icon" href="../photo/icon/j.png" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <main class="order-page">
      <div class="page-header">
        <button class="back-button" onclick="history.back()">
          <i class="fas fa-arrow-left"></i>
          <span>Back</span>
        </button>
        <h1 class="page-title">Your Juice Order</h1>
        <div class="header-spacer"></div>
      </div>

      <div class="order-container">
        <div class="juice-preview-section">
          <div class="juice-preview-card">
            <h2>Your Creation</h2>

            <div class="juice-image-container">
              <img
                id="juiceImage"
                class="juice-image"
                src="images/default-juice.png"
                alt="Juice"
                style="
                  width: 300px;
                  height: 300px;
                  object-fit: contain;
                  border-radius: 20px;
                "
              />

              <div class="water-drops">
                <span></span>
                <span></span>
                <span></span>
              </div>
            </div>

            <p class="juice-name" id="juiceName">Your Custom Juice</p>
          </div>
        </div>

        <div class="order-details-section">
          <div class="order-details-card">
            <h2>Order Details</h2>

            <div class="selected-items">
              <div class="order-item" id="baseTypeItem" style="display: none">
                <div class="item-info">
                  <span class="item-name" id="baseTypeName">Milk</span>
                  <span class="item-category">Base</span>
                </div>
                <span class="item-price" id="baseTypePrice">0.00 $</span>
                <button
                  class="delete-item-btn"
                  onclick="removeBase()"
                  title="Remove"
                >
                  <i class="fas fa-trash-alt"></i>
                </button>
              </div>

              <div
                class="items-separator"
                id="addonsSeparator"
                style="display: none"
              >
                <span>Add-ons</span>
              </div>

              <div id="addonsContainer"></div>
            </div>

            <div class="total-divider"></div>

            <div class="total-section">
              <div class="total-row">
                <span>Subtotal:</span>
                <span id="subtotal">0 $</span>
              </div>
              <div class="total-row final-total">
                <span>Total:</span>
                <span id="finalTotal">0 $</span>
              </div>
            </div>

            <div class="action-buttons">
              <button class="clear-cart-btn" onclick="clearAllCart()">
                <i class="fas fa-trash-alt"></i>
                Clear Cart
              </button>
              <button class="checkout-btn" onclick="proceedToCheckout()">
                Proceed to Checkout
                <i class="fas fa-arrow-right"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="../navbar/script.js"></script>
    <script src="script.js"></script>
  </body>
</html>
